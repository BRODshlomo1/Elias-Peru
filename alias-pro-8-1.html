<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>אליאס PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap');

:root {
  --bg: #f5f0eb;
  --bg2: #ede8e1;
  --card: #ffffff;
  --card2: #faf8f5;
  --border: #e0d8ce;
  --text: #1a1410;
  --sub: #6b5e52;
  --muted: #a8998a;
  --p1: #e8421a;
  --p2: #1a72e8;
  --p3: #1a9e6b;
  --p4: #9b1ae8;
  --gold: #d4920a;
  --green: #1a9e6b;
  --red: #e8421a;
  --shadow: 0 2px 16px rgba(26,20,16,0.08);
  --shadow-lg: 0 8px 40px rgba(26,20,16,0.12);
}

body.dark {
  --bg: #111014;
  --bg2: #1a1820;
  --card: #1e1c24;
  --card2: #252330;
  --border: #2e2a38;
  --text: #f0ecf8;
  --sub: #a89ec0;
  --muted: #6b6280;
  --gold: #e8b430;
  --green: #22c97e;
  --shadow: 0 2px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 50px;
  background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,66,26,0.06) 0%, transparent 70%);
  transition: background 0.4s, color 0.4s;
}

body.dark {
  background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,26,232,0.08) 0%, transparent 70%);
}

/* ── TOP BAR ── */
.top-bar {
  width: 100%; max-width: 560px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.dark-toggle {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 50%; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
}
.dark-toggle:hover { transform: rotate(20deg); }

/* ── LOGO ── */
.logo {
  font-family: 'Fraunces', serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1px;
  margin-bottom: 2px;
  text-align: center;
}
.logo span { color: var(--p1); }
.tagline { color: var(--muted); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; text-align: center; }

/* ── SCREENS ── */
.screen { width: 100%; max-width: 560px; display: none; }
.screen.active { display: block; }

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  transition: background 0.4s, border-color 0.4s;
}

/* ── PLAYER GRID ── */
.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.player-grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.pfield label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.lp1 { color: var(--p1); } .lp2 { color: var(--p2); } .lp3 { color: var(--p3); } .lp4 { color: var(--p4); }

/* player count selector */
.pcount-row { display: flex; gap: 8px; margin-bottom: 20px; }
.pc-btn {
  flex: 1; padding: 10px 6px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--bg2); color: var(--sub); cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 700;
  transition: all 0.2s; text-align: center;
}
.pc-btn.sel { background: var(--p1); color: white; border-color: var(--p1); }

input[type=text] {
  width: 100%; padding: 12px 14px;
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 600;
  outline: none; transition: border-color 0.2s, background 0.2s;
  text-align: center;
}
input[type=text]:focus { border-color: var(--p2); background: var(--card); }

/* ── SLIDERS ── */
.slider-section { margin-bottom: 22px; }
.slider-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.slider-label span:first-child { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--sub); }
.slider-val { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--text); }
.slider-val sup { font-size: 0.75rem; color: var(--muted); font-family: 'Heebo', sans-serif; font-weight: 600; }

.slider-wrap { position: relative; height: 40px; display: flex; align-items: center; }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px;
  border-radius: 3px; outline: none; cursor: pointer;
  background: linear-gradient(to left, var(--border) 0%, var(--border) 100%);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--card);
  border: 3px solid var(--p1);
  box-shadow: 0 2px 8px rgba(232,66,26,0.3);
  cursor: pointer; transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
input[type=range]::-moz-range-thumb {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--card); border: 3px solid var(--p1);
  box-shadow: 0 2px 8px rgba(232,66,26,0.3); cursor: pointer;
}

/* ── BUTTON ── */
.btn {
  display: block; width: 100%; padding: 15px 20px;
  border: none; border-radius: 14px; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
  transition: all 0.18s; text-align: center; letter-spacing: 0.3px;
}
.btn-primary { background: var(--p1); color: white; box-shadow: 0 4px 16px rgba(232,66,26,0.35); }
.btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost { background: var(--bg2); color: var(--sub); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-green { background: var(--green); color: white; box-shadow: 0 4px 16px rgba(26,158,107,0.3); }
.btn-green:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn-sm { padding: 10px 14px; font-size: 0.85rem; width: auto; border-radius: 10px; }
.btn-danger { background: #c0392b; color: white; }
.btn-danger:hover { filter: brightness(1.1); }

/* ── MENU ROWS ── */
.menu-btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
.section-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

/* ── SCOREBOARD ── */
.scores { display: grid; gap: 10px; margin-bottom: 14px; }
.scores.p2 { grid-template-columns: 1fr 1fr; }
.scores.p3 { grid-template-columns: 1fr 1fr 1fr; }
.scores.p4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.sc-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 18px; padding: 14px 10px; text-align: center;
  transition: all 0.3s; position: relative; overflow: hidden;
}
.sc-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:4px; background:var(--border); transition:background 0.3s; }
.sc-card.a0 { border-color: rgba(232,66,26,0.3); box-shadow: 0 4px 20px rgba(232,66,26,0.1); }
.sc-card.a0::after { background: var(--p1); }
.sc-card.a1 { border-color: rgba(26,114,232,0.3); box-shadow: 0 4px 20px rgba(26,114,232,0.1); }
.sc-card.a1::after { background: var(--p2); }
.sc-card.a2 { border-color: rgba(26,158,107,0.3); box-shadow: 0 4px 20px rgba(26,158,107,0.1); }
.sc-card.a2::after { background: var(--p3); }
.sc-card.a3 { border-color: rgba(155,26,232,0.3); box-shadow: 0 4px 20px rgba(155,26,232,0.1); }
.sc-card.a3::after { background: var(--p4); }
.sc-name { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sc-num { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
.sc-target { font-size: 0.62rem; color: var(--muted); margin-bottom: 6px; }
.pips { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
.pip { height: 4px; border-radius: 2px; background: var(--border); flex: 1; min-width: 3px; max-width: 14px; transition: background 0.25s; }
.pip.f0 { background: var(--p1); }
.pip.f1 { background: var(--p2); }
.pip.f2 { background: var(--p3); }
.pip.f3 { background: var(--p4); }
.c0 { color: var(--p1); } .c1 { color: var(--p2); } .c2 { color: var(--p3); } .c3 { color: var(--p4); }

/* ── GAME CARD ── */
.game-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 22px;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}

/* turn + timer row */
.turn-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.turn-pill {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; padding: 6px 14px; border-radius: 20px; white-space: nowrap;
}
.tp0 { background: rgba(232,66,26,0.1); color: var(--p1); border: 1.5px solid rgba(232,66,26,0.2); }
.tp1 { background: rgba(26,114,232,0.1); color: var(--p2); border: 1.5px solid rgba(26,114,232,0.2); }
.tp2 { background: rgba(26,158,107,0.1); color: var(--p3); border: 1.5px solid rgba(26,158,107,0.2); }
.tp3 { background: rgba(155,26,232,0.1); color: var(--p4); border: 1.5px solid rgba(155,26,232,0.2); }
.timer-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
.t-num { font-family: 'Fraunces', serif; font-size: 1.9rem; font-weight: 700; min-width: 42px; text-align: center; transition: color 0.3s; }
.t-bar-bg { flex: 1; height: 7px; background: var(--bg2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.t-bar { height: 100%; border-radius: 4px; background: var(--green); transition: width 1s linear, background 0.5s; }

/* clue */
.clue-box {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
  font-size: 1.05rem; font-weight: 500; line-height: 1.65;
  color: var(--sub); margin: 14px 0;
  min-height: 70px; display: flex; align-items: center; justify-content: center; text-align: center;
  transition: background 0.4s;
}

/* ── LETTER BOXES ── */
.letter-row {
  display: flex; gap: 5px; justify-content: center;
  flex-wrap: wrap; margin: 14px 0 8px; min-height: 52px;
  align-items: flex-end; direction: rtl;
}
.word-group { display: flex; gap: 4px; direction: rtl; }
.word-sp { width: 10px; }
.lbox {
  width: 36px; height: 44px;
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700;
  color: var(--text); transition: all 0.15s;
}
.lbox.cur { border-color: var(--p2); background: rgba(26,114,232,0.06); box-shadow: 0 0 0 3px rgba(26,114,232,0.12); }
.lbox.sel { border-color: var(--gold); background: rgba(212,146,10,0.10); box-shadow: 0 0 0 3px rgba(212,146,10,0.22); cursor: text; animation: selPulse 0.9s ease-in-out infinite; }
.lbox.ok { background: rgba(26,158,107,0.1); border-color: var(--green); color: var(--green); animation: popG 0.3s ease; }
.lbox.bad { background: rgba(232,66,26,0.08); border-color: var(--red); color: var(--red); animation: shk 0.3s ease; }
.lbox:not(.ok):not(.bad) { cursor: pointer; }
@keyframes selPulse { 0%,100%{box-shadow:0 0 0 3px rgba(212,146,10,0.22)}50%{box-shadow:0 0 0 5px rgba(212,146,10,0.38)} }
@keyframes popG { 0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)} }
@keyframes shk { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }

/* HIDDEN REAL INPUT */
#real-input {
  position: fixed; top: 50%; left: 50%;
  opacity: 0; width: 1px; height: 1px;
  font-size: 16px; border: none; outline: none;
  pointer-events: none; transform: translate(-50%, -50%);
}

/* attempt dots */
.adots { display: flex; gap: 6px; align-items: center; justify-content: center; margin: 6px 0 12px; }
.adot-label { font-size: 0.68rem; color: var(--muted); margin-left: 4px; }
.adot { width: 9px; height: 9px; border-radius: 50%; background: var(--bg2); border: 2px solid var(--border); transition: all 0.2s; }
.adot.bad { background: var(--red); border-color: var(--red); }

/* divider */
.div { border: none; border-top: 1.5px solid var(--border); margin: 12px 0; }

/* action row */
.action-row { display: flex; gap: 8px; }
.hint-wrap { position: relative; flex: 1; }
.hint-badge {
  position: absolute; top: -8px; right: -8px;
  font-size: 0.58rem; font-weight: 900; padding: 2px 6px; border-radius: 8px;
  background: var(--green); color: white;
}

/* ── SURPRISE OVERLAY ── */
.surp-ov {
  position: fixed; inset: 0;
  background: rgba(245,240,235,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
body.dark .surp-ov { background: rgba(17,16,20,0.85); }
.surp-ov.show { opacity: 1; pointer-events: all; }
.surp-box {
  background: var(--card); border: 2px solid var(--gold);
  border-radius: 24px; padding: 36px 28px; text-align: center;
  max-width: 320px; width: 90%;
  box-shadow: 0 16px 60px rgba(212,146,10,0.2);
  transform: scale(0.85); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.surp-ov.show .surp-box { transform: scale(1); }
.surp-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
.surp-title { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
.surp-desc { color: var(--sub); font-size: 0.9rem; line-height: 1.55; margin-bottom: 20px; }

/* ── PLAYER TRANSITION OVERLAY ── */
.ptrans-ov {
  position: fixed; inset: 0;
  background: rgba(245,240,235,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 110; backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none; transition: opacity 0.35s;
}
body.dark .ptrans-ov { background: rgba(17,16,20,0.93); }
.ptrans-ov.show { opacity: 1; pointer-events: all; }
.ptrans-box {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 28px; padding: 40px 32px; text-align: center;
  max-width: 340px; width: 92%;
  box-shadow: var(--shadow-lg);
  transform: scale(0.88) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.ptrans-ov.show .ptrans-box { transform: scale(1) translateY(0); }
.ptrans-emoji { font-size: 3rem; margin-bottom: 14px; display: block; animation: bounce 0.6s ease; }
@keyframes bounce { 0%{transform:translateY(0)} 40%{transform:translateY(-12px)} 70%{transform:translateY(-6px)} 100%{transform:translateY(0)} }
.ptrans-title { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
.ptrans-sub { color: var(--sub); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }
.ptrans-scores { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.pts-mini { padding: 8px 14px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg2); text-align: center; min-width: 70px; }
.pts-mini-name { font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
.pts-mini-sc { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; }

/* ── WIN ── */
#win-screen { text-align: center; }
.confetti-wrap { position: relative; overflow: visible; }
.win-trophy { font-size: 5rem; display: block; animation: flt 2s ease-in-out infinite; margin-bottom: 4px; filter: drop-shadow(0 4px 16px rgba(212,146,10,0.4)); }
@keyframes flt { 0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)} }
.win-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), #f5c842);
  color: #3d2800;
  padding: 4px 18px; border-radius: 20px;
  font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px;
}
.win-title { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 900; margin-bottom: 6px; line-height: 1.1; }
.win-sub { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
.final-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.fc {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 18px; padding: 18px 20px; min-width: 100px;
  box-shadow: var(--shadow); position: relative; overflow: hidden; text-align: center;
}
.fc.winner { border-color: var(--gold); box-shadow: 0 4px 24px rgba(212,146,10,0.25); }
.fc.winner::before { content:'👑'; position:absolute; top:-4px; right:50%; transform:translateX(50%); font-size:1.2rem; }
.fc-name { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 10px; }
.fc-sc { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 900; }
.win-actions { display: flex; flex-direction: column; gap: 10px; }
.win-stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.win-stat { background: var(--bg2); border-radius: 12px; padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
.win-stat-val { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; color: var(--text); }
.win-stat-lbl { font-size: 0.6rem; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  pointer-events: none;
  z-index: 999;
  animation: cfalli var(--dur) ease-in forwards;
  border-radius: var(--br);
}
@keyframes cfalli {
  0% { transform: translate(0, -10vh) rotate(0deg); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translate(var(--tx), 110vh) rotate(var(--rot)); opacity: 0; }
}

/* ── LEADERBOARD ── */
#leaderboard-screen .card { padding: 22px; }
.lb-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; width: 36px; text-align: center; }
.lb-rank.gold { color: #d4920a; }
.lb-rank.silver { color: #8a9eb0; }
.lb-rank.bronze { color: #b06840; }
.lb-info { flex: 1; }
.lb-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.lb-meta { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.lb-score { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold); }
.lb-empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: var(--bg);
  border-radius: 30px; padding: 10px 22px;
  font-size: 0.88rem; font-weight: 700;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity: 0; z-index: 300; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── WOBBLY FUN ELEMENTS ── */
@keyframes wiggle { 0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)} }
.fun-pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.06)} }
.streak-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, #ff6b35, #ff9500);
  color: white; padding: 4px 12px; border-radius: 14px;
  font-size: 0.75rem; font-weight: 900; margin-bottom: 8px;
  animation: streakPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes streakPop { 0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0)} }
.streak-area { text-align: center; min-height: 28px; margin-bottom: 4px; }
.quit-btn {
  position: absolute; top: 10px; left: 10px;
  background: transparent; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--muted); padding: 4px;
  border-radius: 8px; transition: all 0.2s;
}
.quit-btn:hover { background: rgba(232,66,26,0.08); color: var(--red); }

/* Firework sparkle */
@keyframes sparkle {
  0%{transform:scale(0) rotate(0deg);opacity:1}
  100%{transform:scale(1.5) rotate(180deg);opacity:0}
}
.sparkle { position:fixed; pointer-events:none; z-index:200; font-size:1.5rem; animation: sparkle 0.7s ease-out forwards; }
</style>

// ═══ DARK MODE ═══
let darkMode = localStorage.getItem('alias-dark') === '1';
if (darkMode) document.body.classList.add('dark');
document.getElementById('dark-toggle').textContent = darkMode ? '☀️' : '🌙';

function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-toggle').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('alias-dark', darkMode ? '1' : '0');
}

// ═══ SLIDER ═══
function updateSlider(type) {
  if (type === 'win') {
    const v = document.getElementById('win-slider').value;
    document.getElementById('win-val').innerHTML = v;
    updateSliderTrack('win-slider', (v - 5) / 25);
  } else {
    const v = document.getElementById('time-slider').value;
    document.getElementById('time-val').innerHTML = v + '<sup>״</sup>';
    updateSliderTrack('time-slider', (v - 30) / 60);
  }
}
function updateSliderTrack(id, pct) {
  const el = document.getElementById(id);
  el.style.background = `linear-gradient(to left, var(--p1) ${pct*100}%, var(--border) ${pct*100}%)`;
}
updateSliderTrack('win-slider', (15-5)/25);
updateSliderTrack('time-slider', (45-30)/60);

// ═══ PLAYER COUNT ═══
let playerCount = 2;
function setPlayerCount(n) {
  playerCount = n;
  document.querySelectorAll('.pc-btn').forEach((b, i) => b.classList.toggle('sel', i === n - 2));
  const grid = document.getElementById('player-inputs');
  const colors = ['lp1','lp2','lp3','lp4'];
  const emojis = ['🔴','🔵','🟢','🟣'];
  const defaults = ['שחקן 1','שחקן 2','שחקן 3','שחקן 4'];
  grid.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const div = document.createElement('div');
    div.className = 'pfield';
    div.innerHTML = `<label class="${colors[i-1]}">${emojis[i-1]} שחקן ${i}</label><input type="text" id="p${i}-name" value="${defaults[i-1]}">`;
    grid.appendChild(div);
  }
}

// ═══ AUDIO ENGINE (Web Audio API — no external files) ═══
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function playTone(freq, type, duration, vol=0.18, fadeOut=true) {
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}
function playChord(freqs, type='sine', dur=0.18, vol=0.12) {
  freqs.forEach((f,i) => setTimeout(() => playTone(f, type, dur, vol), i*30));
}
const SFX = {
  correct() { playChord([523, 659, 784], 'sine', 0.22, 0.14); },
  wrong()   { playTone(180, 'sawtooth', 0.18, 0.12); setTimeout(()=>playTone(150,'sawtooth',0.18,0.10),100); },
  tick()    { playTone(880, 'square', 0.04, 0.06, false); },
  urgentTick() { playTone(1100, 'square', 0.05, 0.10, false); },
  surprise() { [600,750,900,1100].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.12,0.13),i*60)); },
  win()     { const notes=[523,659,784,1047]; notes.forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.35,0.16),i*120)); },
  skip()    { playTone(330, 'triangle', 0.15, 0.10); },
  hint()    { playTone(660, 'sine', 0.20, 0.12); },
  type()    { playTone(600 + Math.random()*200, 'sine', 0.05, 0.05); },
  trans()   { playChord([392,494,587],'sine',0.25,0.12); },
};

function focusInput() {
  realInput.focus({ preventScroll: true });
  setTimeout(() => realInput.focus({ preventScroll: true }), 50);
}

realInput.addEventListener('keydown', e => {
  if (!st.word || !st.active) return;
  if (e.key === 'Enter') { e.preventDefault(); submitAnswer(); return; }
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (st.selPos >= 0) {
      // delete the char at selPos and shift left
      st.typed = st.typed.slice(0, st.selPos) + st.typed.slice(st.selPos + 1);
      st.selPos = Math.max(0, st.selPos - 1);
      if (st.typed.length === 0) st.selPos = -1;
      renderBoxes();
    } else if (st.typed.length > 0) {
      st.typed = st.typed.slice(0, -1);
      renderBoxes();
    }
    return;
  }
  // Arrow keys to move selection
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const total = st.word.w.replace(/ /g, '').length;
    if (st.selPos < 0) {
      st.selPos = st.typed.length > 0 ? st.typed.length - 1 : 0;
    } else {
      st.selPos += (e.key === 'ArrowLeft' ? 1 : -1); // RTL: left = higher index
      st.selPos = Math.max(0, Math.min(total - 1, st.selPos));
    }
    renderBoxes();
    return;
  }
  if (e.key === 'Escape') { e.preventDefault(); st.selPos = -1; renderBoxes(); return; }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    const total = st.word.w.replace(/ /g, '').length;
    SFX.type();
    if (st.selPos >= 0) {
      // replace char at selPos
      const arr = st.typed.split('');
      arr[st.selPos] = e.key;
      st.typed = arr.join('');
      // advance selection
      if (st.selPos < total - 1) st.selPos++;
      else st.selPos = -1;
      renderBoxes();
    } else {
      if (st.typed.length < total) { st.typed += e.key; renderBoxes(); }
    }
  }
});

realInput.addEventListener('input', () => {
  if (!st.word || !st.active) return;
  const total = st.word.w.replace(/ /g, '').length;
  const val = realInput.value;
  if (val.length > 0) {
    for (const ch of [...val]) {
      if (ch === '\n') continue;
      SFX.type();
      if (st.selPos >= 0) {
        const arr = st.typed.split('');
        arr[st.selPos] = ch;
        st.typed = arr.join('');
        if (st.selPos < total - 1) st.selPos++;
        else st.selPos = -1;
      } else {
        if (st.typed.length < total) st.typed += ch;
      }
    }
    realInput.value = '';
    renderBoxes();
  }
});

// ═══ TIMER — ACCURATE ═══
function startTimer() {
  clearInterval(st.iv);
  st.timer = cfg.time;
  st._timerStart = performance.now();
  st._timerRemain = cfg.time * 1000;
  updTimer();
  st.iv = setInterval(() => {
    const elapsed = performance.now() - st._timerStart;
    const remaining = Math.max(0, st._timerRemain - elapsed);
    st.timer = Math.ceil(remaining / 1000);
    updTimer();
    if (remaining <= 0) { clearInterval(st.iv); endTurn(); }
  }, 100);
}
function resumeTimer() {
  st._timerStart = performance.now();
  st._timerRemain = st.timer * 1000;
  st.iv = setInterval(() => {
    const elapsed = performance.now() - st._timerStart;
    const remaining = Math.max(0, st._timerRemain - elapsed);
    st.timer = Math.ceil(remaining / 1000);
    updTimer();
    if (remaining <= 0) { clearInterval(st.iv); endTurn(); }
  }, 100);
}
function updTimer() {
  const n = document.getElementById('t-num'), b = document.getElementById('t-bar');
  n.textContent = st.timer;
  b.style.width = Math.max(0, st.timer / cfg.time * 100) + '%';
  const col = st.timer > cfg.time * 0.4 ? 'var(--green)' : st.timer > cfg.time * 0.2 ? 'var(--gold)' : 'var(--red)';
  b.style.background = col; n.style.color = col;
  if (st.timer <= 5 && st.timer > 0 && st.active) {
    n.style.animation = 'pulse 0.4s ease-in-out';
    setTimeout(() => n.style.animation = '', 400);
    SFX.urgentTick();
  } else if (st.timer <= 10 && st.timer > 5 && st.active) {
    SFX.tick();
  }
}

function newQ() {
  if (st.used.size >= DB.length) st.used.clear();
  let idx; do { idx = Math.floor(Math.random() * DB.length); } while (st.used.has(idx));
  st.used.add(idx); st.word = DB[idx];
  st.typed = ''; st.attempts = 0; st.maxAttempts = 3; st.hintUsed = false;
  st.selPos = -1;
  realInput.value = '';
  updateDots();
  document.getElementById('clue-box').textContent = st.word.c;
  buildBoxes(); renderBoxes(); updateHintBtn();
  st.sqCount++;
  if (st.sqCount >= 4 && Math.random() < 0.3) { st.sqCount = 0; setTimeout(triggerSurprise, 150); }
  setTimeout(focusInput, 50);
  updateStreakDisplay();
}

    grp.style.cssText = 'display:flex;gap:4px;direction:ltr;';
    const boxes = [];
    for (let i = 0; i < word.length; i++) {
      const box = document.createElement('div');
      box.className = 'lbox'; box.dataset.pos = pos;
      // click to select this box for editing
      box.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!st.active) return;
        const p = +box.dataset.pos;
        if (st.selPos === p) { st.selPos = -1; } // toggle off
        else { st.selPos = p; }
        SFX.hint();
        renderBoxes();
        focusInput();
      });
      boxes.push(box); pos++;
    }
    boxes.reverse().forEach(b => grp.appendChild(b));
    row.appendChild(grp);
    if (wi < words.length - 1) {
      const sp = document.createElement('div'); sp.className = 'word-sp'; row.appendChild(sp);
    }
  });
}

function renderBoxes(state = 'normal') {
  const boxes = document.querySelectorAll('#letter-row .lbox');
  boxes.forEach(box => {
    const pos = +box.dataset.pos;
    box.textContent = st.typed[pos] || '';
    box.className = 'lbox';
    if (state === 'normal') {
      if (st.selPos >= 0 && pos === st.selPos) box.classList.add('sel');
      else if (st.selPos < 0 && pos === st.typed.length) box.classList.add('cur');
    }
    if (state === 'ok') box.classList.add('ok');
    if (state === 'bad') box.classList.add('bad');
  });
}

// ═══ SUBMIT ═══
function submitAnswer() {
  if (!st.word || !st.active) return;
  const ans = st.typed.trim();
  if (!ans) return;
  st.totalQ++;
  if (norm(ans) === norm(st.word.w)) {
    st.selPos = -1;
    st.totalCorrect++;
    st.streak++;
    let pts = 1;
    if (st.x3) { pts = 3; st.x3 = false; }
    else if (st.x2) { pts = 2; st.x2 = false; }
    if (st.streak > 0 && st.streak % 5 === 0) { pts++; showToast(`🔥 רצף ${st.streak}! +בונוס!`); }
    st.sc[st.p] += pts; updSD(st.p);
    SFX.correct();
    renderBoxes('ok');
    spawnSparkle();
    if (pts > 1 && st.streak % 5 !== 0) showToast('🌟 +' + pts + ' נקודות!');
    if (st.sc[st.p] >= cfg.win) { clearInterval(st.iv); setTimeout(endGame, 500); return; }
    setTimeout(() => { newQ(); focusInput(); }, 650);
  } else {
    st.selPos = -1;
    st.streak = 0;
    updateStreakDisplay();
    SFX.wrong();
    if (st.shield) { st.shield = false; showToast('🛡️ המגן הגן עליך!'); st.typed = ''; realInput.value = ''; renderBoxes(); return; }
    st.attempts++; updateDots(); renderBoxes('bad');
    setTimeout(() => { st.typed = ''; realInput.value = ''; renderBoxes(); focusInput(); }, 500);
    if (st.attempts >= st.maxAttempts) setTimeout(() => { newQ(); focusInput(); }, 600);
  }
}

function norm(s) {
  return s.trim()
    .replace(/[ְ-ׇ]/g, '')
    .replace(/["'״׳""'']/g, '')
    .replace(/\s+/g, ' ')
    .toLowerCase();
}
function updateDots() { for (let i = 0; i < 3; i++) { document.getElementById('d' + i).className = 'adot' + (i < st.attempts ? ' bad' : ''); } }

function skipWord() {
  if (!st.active) return;
  st.streak = 0; updateStreakDisplay();
  st.selPos = -1;
  SFX.skip();
  if (st.freeSkip) { st.freeSkip = false; showToast('🎲 דילוג חינם!'); }
  else { st.sc[st.p] = Math.max(0, st.sc[st.p] - 1); updSD(st.p); }
  newQ(); focusInput();
}

function updateHintBtn() {
  const badge = document.getElementById('hint-badge');
  if (st.hintFree) { badge.textContent = 'FREE'; badge.style.background = 'var(--green)'; }
  else { badge.textContent = '-2'; badge.style.background = 'var(--red)'; }
}
function useHint() {
  if (!st.word || !st.active) return;
  if (st.hintUsed) { showToast('💡 כבר השתמשת ברמז'); return; }
  st.hintUsed = true;
  SFX.hint();
  const nsp = st.word.w.replace(/ /g, '');
  if (st.hintFree) { st.hintFree = false; showToast('💡 אות ראשונה: ' + nsp[0]); updateHintBtn(); }
  else {
    if (st.sc[st.p] < 2) { showToast('❌ דרושות 2 נקודות לרמז'); return; }
    st.sc[st.p] -= 2; updSD(st.p); showToast('💡 שתי אותיות ראשונות: ' + nsp[0] + nsp[1]);
  }
}

// ═══ END TURN ═══
function endTurn() {
  clearInterval(st.iv);
  st.active = false;
  const nextP = (st.p + 1) % playerCount;
  st.p = nextP;
  st.x2 = false; st.x3 = false; st.shield = false; st.freeSkip = false;
  st.streak = 0; updateStreakDisplay();
  updCard();
  setTimeout(() => showPlayerTrans(nextP, false), 250);
}

// ═══ PLAYER TRANSITION ═══
function showPlayerTrans(pIdx, isFirst) {
  SFX.trans();
  const ov = document.getElementById('ptrans-ov');
  const emojis = ['🔴','🔵','🟢','🟣'];
  const funMessages = [
    'הכן עצמך!', 'בהצלחה!', 'הגיע תורך!', 'אתה הכוכב!', 'קדימה!', 'תראה מה אתה שווה!',
    'הזמן לזרוח!', 'אל תבייש אותנו!', 'תפתיע אותנו!', 'מוכן?'
  ];
  const msg = isFirst ? 'מסור את המכשיר לשחקן הראשון!' : 'מסור את המכשיר לשחקן הבא!';
  document.getElementById('ptrans-emoji').textContent = emojis[pIdx];
  document.getElementById('ptrans-title').textContent = 'תור ' + st.names[pIdx];
  document.getElementById('ptrans-sub').textContent = msg + '\n' + funMessages[Math.floor(Math.random() * funMessages.length)];

  const scoresEl = document.getElementById('ptrans-scores');
  scoresEl.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    scoresEl.innerHTML += `<div class="pts-mini"><div class="pts-mini-name">${st.names[i]}</div><div class="pts-mini-sc c${i}">${st.sc[i]}</div></div>`;
  }
  ov.classList.add('show');
}

function closeTrans() {
  document.getElementById('ptrans-ov').classList.remove('show');
  updCard();
  st.active = true;
  newQ(); startTimer(); focusInput();
}

// ═══ QUIT ═══
function confirmQuit() {
  if (confirm('לצאת למסך הראשי? המשחק יאבד.')) {
    clearInterval(st.iv);
    st.active = false;
    showScreen('setup-screen');
  }
}

// ═══ SURPRISE ═══
function triggerSurprise() {
  clearInterval(st.iv);
  SFX.surprise();
  const s = SURPRISES[Math.floor(Math.random() * SURPRISES.length)];
  document.getElementById('surp-icon').textContent = s.icon;
  document.getElementById('surp-title').textContent = s.title;
  document.getElementById('surp-desc').textContent = s.desc;
  document.getElementById('surp-ov').classList.add('show');
  window._surp = s;
}
function closeSurprise() {
  document.getElementById('surp-ov').classList.remove('show');
  if (window._surp) { window._surp.fx(st); window._surp = null; }
  resumeTimer(); focusInput();
}

// ═══ WIN ═══
function endGame() {
  st.active = false; clearInterval(st.iv);
  let winnerIdx = 0;
  for (let i = 1; i < playerCount; i++) {
    if (st.sc[i] > st.sc[winnerIdx]) winnerIdx = i;
  }
  const duration = Math.round((Date.now() - st.startTime) / 1000);
  const accuracy = st.totalQ > 0 ? Math.round(st.totalCorrect / st.totalQ * 100) : 0;

  document.getElementById('win-trophy').textContent = '🏆';
  const t = document.getElementById('win-title');
  t.textContent = st.names[winnerIdx] + ' ניצח! 🎉';
  t.style.color = PLAYER_COLORS[winnerIdx];
  document.getElementById('win-sub').textContent = 'סיים עם ' + st.sc[winnerIdx] + ' נקודות';

  // stats
  const statsRow = document.getElementById('win-stats-row');
  const mins = Math.floor(duration / 60);
  const secs = duration % 60;
  statsRow.innerHTML = `
    <div class="win-stat"><div class="win-stat-val">${mins}:${String(secs).padStart(2,'0')}</div><div class="win-stat-lbl">זמן</div></div>
    <div class="win-stat"><div class="win-stat-val">${st.totalQ}</div><div class="win-stat-lbl">שאלות</div></div>
    <div class="win-stat"><div class="win-stat-val">${accuracy}%</div><div class="win-stat-lbl">דיוק</div></div>
  `;

  // final scores
  const finalRow = document.getElementById('final-row');
  finalRow.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    finalRow.innerHTML += `<div class="fc ${i === winnerIdx ? 'winner' : ''}">
      <div class="fc-name c${i}" id="fcn${i}">${st.names[i]}</div>
      <div class="fc-sc c${i}">${st.sc[i]}</div>
    </div>`;
  }

  showScreen('win-screen');
  SFX.win();
  setTimeout(launchConfetti, 200);
  saveToLeaderboard(st.names[winnerIdx], st.sc[winnerIdx], duration);
}

// ═══ CONFETTI ═══
function launchConfetti() {
  const colors = ['#e8421a','#1a72e8','#1a9e6b','#d4920a','#9b1ae8','#e83c9b','#43e8a0'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: 0;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        --dur: ${1.5 + Math.random() * 2}s;
        --tx: ${-100 + Math.random() * 200}px;
        --rot: ${Math.random() * 720 - 360}deg;
        --br: ${Math.random() > 0.5 ? '50%' : '0'};
        width: ${6 + Math.random() * 10}px;
        height: ${6 + Math.random() * 10}px;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

// ═══ SPARKLE ═══
function spawnSparkle() {
  const emojis = ['✨','💫','⭐','🌟','💥'];
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.cssText = `top: ${30 + Math.random() * 40}vh; left: ${10 + Math.random() * 80}vw;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ═══ LEADERBOARD ═══
function saveToLeaderboard(name, score, duration) {
  try {
    const lb = JSON.parse(localStorage.getItem('alias-lb') || '[]');
    lb.push({ name, score, duration, date: new Date().toLocaleDateString('he-IL') });
    lb.sort((a, b) => b.score - a.score);
    lb.splice(10);
    localStorage.setItem('alias-lb', JSON.stringify(lb));
  } catch (e) {}
}
function showLeaderboard() {
  const list = document.getElementById('lb-list');
  try {
    const lb = JSON.parse(localStorage.getItem('alias-lb') || '[]');
    if (lb.length === 0) {
      list.innerHTML = '<div class="lb-empty">עדיין אין שיאים. שחקו כדי לרשום!</div>';
      return;
    }
    list.innerHTML = lb.map((e, i) => {
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i+1);
      const mins = Math.floor((e.duration||0) / 60);
      const secs = (e.duration||0) % 60;
      return `<div class="lb-row">
        <div class="lb-rank ${rankClass}">${rankLabel}</div>
        <div class="lb-info">
          <div class="lb-name">${e.name}</div>
          <div class="lb-meta">${e.date} · ${mins}:${String(secs).padStart(2,'0')} משחק</div>
        </div>
        <div class="lb-score">${e.score}</div>
      </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="lb-empty">שגיאה בטעינת שיאים</div>';
  }
}
function clearLeaderboard() {
  if (confirm('למחוק את כל השיאים?')) {
    localStorage.removeItem('alias-lb');
    showLeaderboard();
  }
}

// ═══ SCREEN ═══
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'leaderboard-screen') showLeaderboard();
}

// ═══ TOAST ═══
let _tt = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
